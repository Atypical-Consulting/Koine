<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Koine">
  <!-- Maskable variant of the hexagon-κ mark: a full-bleed accent field (no rounded corners / no
       transparent edges) so the OS mask never reveals a gap, with the glyph kept inside the central
       maskable safe zone (the mark's farthest point sits ~0.5r from centre, well within the 0.8r safe
       circle). Source for public/icons/icon-512-maskable.png and apple-touch-icon-180.png. -->
  <rect width="120" height="120" fill="#5aa9ff"/>
  <svg x="20" y="20" width="80" height="80" viewBox="0 0 120 120" fill="none">
    <g stroke="#08111f" stroke-linejoin="round" stroke-linecap="round">
      <polygon points="106,60 83,99.84 37,99.84 14,60 37,20.16 83,20.16" stroke-width="6"/>
      <g stroke-width="7.5">
        <path d="M48 36 V84"/>
        <path d="M48 60 L78 36"/>
        <path d="M48 60 L78 84"/>
      </g>
    </g>
  </svg>
</svg>
