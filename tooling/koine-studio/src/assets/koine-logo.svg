<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112.255 32" fill="none" role="img" aria-label="Koine">
  <!-- Horizontal Koine lockup: hexagon-κ mark + "Koine" wordmark. Assembled from in-repo primitives —
