<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" role="img" aria-label="Koine">
  <!-- The favicon copy of the in-app hexagon-κ mark (koineMark() in src/shared/logo.ts). A browser
       tab has no --koi-* tokens, so the stroke flips by prefers-color-scheme instead: the light
       accent on a light tab, the lighter accent on a dark tab — the same adaptive treatment the docs
       site uses (website/public/favicon.svg). Keep the geometry in sync with the builder. -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <polygon points="106,60 83,99.84 37,99.84 14,60 37,20.16 83,20.16" stroke-width="6"/>
    <g stroke-width="7.5">
      <path d="M48 36 V84"/>
      <path d="M48 60 L78 36"/>
      <path d="M48 60 L78 84"/>
    </g>
  </g>
  <style>
    g { stroke: #2f7fe0; }
    @media (prefers-color-scheme: dark) { g { stroke: #5aa9ff; } }
  </style>
</svg>
