<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/koine-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koine Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header id="toolbar">
        <button type="button" id="btn-home" class="brand" title="Back to the start screen" aria-label="Back to the start screen">
          <!-- Monogram injected from the shared koineMark() template at startup (see ide.ts) so the
               app's marks have a single source; only the favicon SVG is a separate literal-colour copy. -->
          <span class="brand-logo" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-name">Koine</span>
            <span class="brand-eyebrow">Studio</span>
          </span>
        </button>

        <div class="toolbar-actions" role="toolbar" aria-label="Model actions">
          <div class="tb-group">
            <button type="button" id="btn-new" title="Start a new empty model (prompts if you have unsaved changes)">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3.4v9.2M3.4 8h9.2" /></svg>
              New
            </button>
            <button type="button" id="btn-open-folder">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M2.2 4.3c0-.7.5-1.3 1.2-1.3h2.9l1.3 1.6h4.9c.7 0 1.3.6 1.3 1.3v6c0 .7-.6 1.2-1.3 1.2H3.4c-.7 0-1.2-.5-1.2-1.2z" /></svg>
              Open
            </button>
          </div>
          <span class="tb-divider" aria-hidden="true"></span>
          <div id="history-controls-host"></div>
          <span class="tb-divider" aria-hidden="true"></span>
          <div class="tb-group">
            <button type="button" id="btn-generate-project" class="tb-primary" title="Generate a downloadable project">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.6v6.8M5.2 6.8 8 9.6l2.8-2.8M3.4 12.6h9.2" /></svg>
              Generate
            </button>
            <button type="button" id="btn-save-project" title="Save this workspace as a project on disk">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M3 3h7l3 3v7H3zM5 3v3h5M5 13v-4h6v4" /></svg>
              Save to disk
            </button>
          </div>
          <span class="tb-divider" aria-hidden="true"></span>
          <button type="button" id="btn-check">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8.4 6.4 12 13 4.4" /></svg>
            Check
          </button>
        </div>

        <!-- The top-bar "scope path" (#146): one breadcrumb that doubles as the bounded-context selector.
             Its first segment is a <select> dressed as a crumb (scopes the model-derived surfaces —
             outline, diagram, counts, inspector, Events/Relationships tables — to one context); its
             second is the selected element with its Explorer construct icon. The <ContextBreadcrumb>
             Preact panel renders here (see inspectorController); hidden until a model with a context is
             open. -->
        <div id="breadcrumb-host" class="topbar-breadcrumb" hidden></div>

        <div class="toolbar-right">
          <button type="button" id="palette-hint" class="palette-hint" title="Command palette (⌘K)" aria-label="Open command palette">⌘K</button>
          <span class="tb-divider" aria-hidden="true"></span>
          <button type="button" id="btn-theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="5.5" />
              <path d="M8 2.5a5.5 5.5 0 0 0 0 11z" fill="currentColor" stroke="none" />
            </svg>
          </button>
          <button type="button" id="btn-prefs" class="icon-btn" title="Settings" aria-label="Settings">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M2.5 5.5h11M2.5 10.5h11" />
              <circle cx="6" cy="5.5" r="1.7" />
              <circle cx="10" cy="10.5" r="1.7" />
            </svg>
          </button>
          <div id="status" data-kind="connecting" role="status" aria-live="polite">connecting…</div>
          <button type="button" id="unsaved-indicator" class="unsaved-indicator" hidden></button>
        </div>
      </header>

      <main id="split">
        <!-- One left sidebar, one scroll bar: Files (the workspace tree), Explorer (the DDD
             construct/context tree, renderModelOutline), Overview (per-context counts,
             renderOverviewCounts) and Documentation (shortcuts into the model's prose surfaces). The
             sections are collapsible and the whole rail is the single scroll container — section bodies
             don't scroll on their own. -->
        <aside id="leftrail" class="pane" aria-label="Workspace">
          <section class="rail-sect" id="rail-files" data-open="true">
            <div class="rail-sect-head-row">
              <button type="button" class="rail-sect-head" aria-expanded="true" aria-controls="filetree-body">Files</button>
              <span id="filetree-title" class="rail-sect-meta">Scratch</span>
            </div>
            <div class="rail-sect-body" id="filetree-body"></div>
          </section>
          <section class="rail-sect" id="rail-explorer" data-open="true">
            <button type="button" class="rail-sect-head" aria-expanded="true" aria-controls="rail-explorer-body">Explorer</button>
            <div class="rail-sect-body" id="rail-explorer-body"></div>
          </section>
          <section class="rail-sect" id="rail-overview" data-open="true">
            <button type="button" class="rail-sect-head" aria-expanded="true" aria-controls="rail-overview-body">Overview</button>
            <div class="rail-sect-body" id="rail-overview-body"></div>
          </section>
          <!-- Documentation: four shortcuts into the model's prose surfaces. These are navigation, so
               they wear the toolbar's stroked line-icon idiom (not the Explorer's colour-coded construct
               shapes). Wired in inspectorController via [data-doclink]. -->
          <section class="rail-sect" id="rail-docs" data-open="true">
            <button type="button" class="rail-sect-head" aria-expanded="true" aria-controls="rail-docs-body">Documentation</button>
            <nav class="rail-sect-body" id="rail-docs-body" aria-label="Documentation">
              <ul class="koi-doclinks">
                <li>
                  <button type="button" class="koi-doclink" data-doclink="contextmap" title="How the bounded contexts relate">
                    <svg class="tb-ico koi-doclink-ico" viewBox="0 0 16 16" aria-hidden="true">
                      <circle cx="4" cy="4.5" r="1.7" /><circle cx="12" cy="5.5" r="1.7" /><circle cx="7" cy="12" r="1.7" />
                      <path d="M5.6 5 10.4 5.4M4.7 6.1 6.3 10.6M11.2 7 8 10.7" />
                    </svg>
                    <span class="koi-doclink-label">Context Map</span>
                  </button>
                </li>
                <li>
                  <button type="button" class="koi-doclink" data-doclink="glossary" title="The shared vocabulary of the domain">
                    <svg class="tb-ico koi-doclink-ico" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M8 4.6C6.7 3.7 4.8 3.5 2.8 4V12c2-.5 3.9-.3 5.2.6 1.3-.9 3.2-1.1 5.2-.6V4c-2-.5-3.9-.3-5.2.6Z" />
                      <path d="M8 4.6V12.6" />
                    </svg>
                    <span class="koi-doclink-label">Ubiquitous Language</span>
                  </button>
                </li>
                <li>
                  <button type="button" class="koi-doclink" data-doclink="adr" title="Architecture Decision Records">
                    <svg class="tb-ico koi-doclink-ico" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M4 2.5h4.6L12 5.9V13.5H4Z" /><path d="M8.4 2.5v3.2h3.2" /><path d="M5.8 9.6 7.2 11 10 7.9" />
                    </svg>
                    <span class="koi-doclink-label">ADR</span>
                  </button>
                </li>
                <li>
                  <button type="button" class="koi-doclink" data-doclink="notes" title="Free-form notes on the model">
                    <svg class="tb-ico koi-doclink-ico" viewBox="0 0 16 16" aria-hidden="true">
                      <path d="M10.4 3.1 12.9 5.6 6.1 12.4 3 13 3.6 9.9Z" /><path d="M9.2 4.3 11.7 6.8" />
                    </svg>
                    <span class="koi-doclink-label">Notes</span>
                  </button>
                </li>
              </ul>
            </nav>
          </section>
        </aside>
        <div class="koi-resizer" id="leftrail-resizer" aria-hidden="true"></div>

        <!-- Center: Visual (the diagram) / Code (the editor plus the generated code, the compatibility
             check and the assistant) / Documentation (the glossary, renderGlossary). The bottom strip
             (Problems / Events / Relationships / Context Map) lives INSIDE the center, under the canvas
             or editor, so it serves both Visual and Code (and is hidden on Documentation); Properties and
             the left sidebar therefore span full height. -->
        <section id="center" class="pane" aria-label="Editor">
          <div id="center-tabs" role="tablist" aria-label="Editor view">
            <button type="button" class="center-tab" id="center-tab-visual" role="tab" data-center="visual" aria-selected="true">Visual</button>
            <button type="button" class="center-tab" id="center-tab-technical" role="tab" data-center="technical" aria-selected="false">Code</button>
            <button type="button" class="center-tab" id="center-tab-docs" role="tab" data-center="docs" aria-selected="false">Documentation</button>
          </div>
          <div id="center-body">
            <section id="center-visual" class="center-host" role="tabpanel" aria-label="Visual"></section>
            <section id="center-technical" class="center-host" role="tabpanel" aria-label="Code" hidden>
              <div id="tech-tabs" role="tablist" aria-label="Code view">
                <button type="button" class="tech-tab" id="tech-tab-editor" role="tab" data-tech="editor" aria-selected="true">Editor</button>
                <button type="button" class="tech-tab" id="tech-tab-preview" role="tab" data-tech="preview" aria-selected="false">Generated</button>
                <button type="button" class="tech-tab" id="tech-tab-check" role="tab" data-tech="check" aria-selected="false">Compatibility</button>
                <button type="button" class="tech-tab" id="tech-tab-assistant" role="tab" data-tech="assistant" aria-selected="false">Assistant</button>
              </div>
              <div id="tech-body">
                <section id="editor-pane" class="tech-view" aria-label="Editor"></section>
                <div id="view-preview" class="tech-view" role="tabpanel" hidden></div>
                <div id="view-check" class="tech-view doc-view" role="tabpanel" hidden></div>
                <div id="view-assistant" class="tech-view" role="tabpanel" hidden></div>
              </div>
            </section>
            <!-- Documentation = Glossary (the ubiquitous language) + Decisions (ADRs) + Notes — three
                 sibling pages, split from the former combined "Decisions & Notes" surface (#174). Sub-tabs
                 mirror the Code pane so each master-detail page gets the center's full width. -->
            <section id="center-docs" class="center-host" role="tabpanel" aria-label="Documentation" hidden>
              <div id="docs-tabs" role="tablist" aria-label="Documentation view">
                <button type="button" class="docs-tab" id="docs-tab-glossary" role="tab" data-docs="glossary" aria-selected="true">Glossary</button>
                <button type="button" class="docs-tab" id="docs-tab-adr" role="tab" data-docs="adr" aria-selected="false">Decisions</button>
                <button type="button" class="docs-tab" id="docs-tab-notes" role="tab" data-docs="notes" aria-selected="false">Notes</button>
              </div>
              <div id="docs-body">
                <div id="view-glossary" class="tech-view doc-view" role="tabpanel"></div>
                <div id="view-docs" class="tech-view doc-view" role="tabpanel" hidden></div>
                <div id="view-notes" class="tech-view doc-view" role="tabpanel" hidden></div>
              </div>
            </section>
          </div>

          <footer id="diagnostics" aria-label="Problems, events, relationships and the context map">
            <div class="koi-resizer koi-resizer-y" id="diag-resizer" aria-hidden="true"></div>
            <div id="diag-header">
              <button type="button" id="diag-collapse" class="diag-collapse" aria-expanded="true" aria-controls="diag-body panel-events panel-relationships panel-contextmap" aria-label="Collapse panel">
                <svg class="diag-chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6.5 8 10 12 6.5" /></svg>
              </button>
              <div class="diag-tabs" role="tablist" aria-label="Bottom panel">
                <button type="button" class="diag-tab" id="tab-problems" role="tab" data-panel="problems" aria-selected="true" aria-controls="diag-body">Problems</button>
                <button type="button" class="diag-tab" id="tab-events" role="tab" data-panel="events" aria-selected="false" aria-controls="panel-events">Events</button>
                <button type="button" class="diag-tab" id="tab-relationships" role="tab" data-panel="relationships" aria-selected="false" aria-controls="panel-relationships">Relationships</button>
                <button type="button" class="diag-tab" id="tab-contextmap" role="tab" data-panel="contextmap" aria-selected="false" aria-controls="panel-contextmap">Context Map</button>
              </div>
              <span id="diag-count" class="diag-count"></span>
            </div>
            <div id="diag-body" class="diag-panel" role="tabpanel" aria-labelledby="tab-problems"></div>
            <div id="panel-events" class="diag-panel" role="tabpanel" aria-labelledby="tab-events" hidden></div>
            <div id="panel-relationships" class="diag-panel" role="tabpanel" aria-labelledby="tab-relationships" hidden></div>
            <div id="panel-contextmap" class="diag-panel doc-view" role="tabpanel" aria-labelledby="tab-contextmap" hidden></div>
          </footer>
        </section>
        <div class="koi-resizer" id="split-resizer" aria-hidden="true"></div>

        <!-- Right rail: the element inspector, dedicated to Properties. Rules/Notes are placeholder
             tabs matching the mockup chrome — read-only until a follow-up builds them. -->
        <aside id="right" class="pane" aria-label="Properties">
          <div id="right-tabs" role="tablist" aria-label="Properties">
            <button type="button" class="rtab" id="rtab-props" role="tab" data-rview="props" aria-selected="true">Properties</button>
            <button type="button" class="rtab" id="rtab-rules" role="tab" data-rview="rules" aria-selected="false">Rules</button>
            <button type="button" class="rtab" id="rtab-notes" role="tab" data-rview="notes" aria-selected="false">Notes</button>
          </div>
          <div id="right-body">
            <div id="inspector-host" class="rview" role="tabpanel"></div>
            <div id="rview-rules" class="rview doc-view" role="tabpanel" hidden><p class="muted">Coming soon.</p></div>
            <div id="rview-notes" class="rview doc-view" role="tabpanel" hidden><p class="muted">Coming soon.</p></div>
          </div>
        </aside>
      </main>

      <!-- Bottom status bar: a pure projection of existing state (active context, model validity,
           connection, version). #status stays in the toolbar; #sb-connection mirrors it here. -->
      <footer id="statusbar" aria-label="Model status">
        <span class="sb-item" id="sb-context">Context: —</span>
        <span class="sb-item" id="sb-validity">No errors</span>
        <!-- Workspace-wide problems rollup (every file, not just the active one). Empty when clean;
             the <WorkspaceProblemsBadge> Preact panel renders its sb-item span in here. -->
        <span id="sb-problems-host"></span>
        <span class="sb-spacer"></span>
        <span class="sb-item" id="sb-connection">Connecting…</span>
        <span class="sb-item" id="sb-version"></span>
      </footer>
    </div>
  </body>
</html>
