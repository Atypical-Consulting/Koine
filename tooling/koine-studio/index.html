<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koine Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header id="toolbar">
        <div class="brand">
          <span class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 28" fill="none" role="img" aria-label="Koine">
              <g fill="var(--koi-accent)">
                <rect x="2" y="3" width="4.4" height="22" rx="1.4"/>
                <path d="M8.2 13.6 18 3h5.6l-9.5 10.3L24 25h-5.9l-7.8-9.3-2.1 2.2z"/>
              </g>
              <g fill="currentColor">
                <path d="M38.4 10.1c4 0 6.9 3 6.9 7.5s-2.9 7.6-6.9 7.6-6.9-3.1-6.9-7.6 2.9-7.5 6.9-7.5zm0 3.9c-1.6 0-2.7 1.4-2.7 3.6s1.1 3.7 2.7 3.7 2.7-1.5 2.7-3.7-1.1-3.6-2.7-3.6z"/>
                <path d="M49.2 4.3c1.4 0 2.5 1.1 2.5 2.5s-1.1 2.4-2.5 2.4-2.4-1-2.4-2.4 1.1-2.5 2.4-2.5zm-2.1 6.2h4.2V25h-4.2z"/>
                <path d="M54.1 10.5h4.2v2c.9-1.5 2.4-2.4 4.3-2.4 3.2 0 5.2 2.2 5.2 5.8V25h-4.2v-8.1c0-1.8-.9-2.8-2.5-2.8s-2.6 1.1-2.6 2.9V25h-4.4z"/>
                <path d="M77.9 20.4l3.5 1.6c-1.2 2.2-3.5 3.5-6.4 3.5-4.2 0-7.1-3.1-7.1-7.6s2.9-7.6 6.9-7.6 6.7 3 6.7 7.4c0 .5 0 1-.1 1.4h-9.4c.3 1.8 1.5 2.9 3.2 2.9 1.2 0 2.2-.5 2.8-1.6zm-5.4-4.1h5.3c-.3-1.6-1.3-2.6-2.6-2.6s-2.4 1-2.7 2.6z"/>
              </g>
            </svg>
          </span>
          <span class="brand-name">Koine Studio</span>
        </div>
        <div class="toolbar-actions">
          <button type="button" id="btn-new">New</button>
          <button type="button" id="btn-open-folder">Open Folder…</button>
          <button type="button" id="btn-preview-cs">Preview C#</button>
          <button type="button" id="btn-preview-ts">Preview TypeScript</button>
          <button type="button" id="btn-check">Check…</button>
        </div>
        <div class="toolbar-right">
          <span class="palette-hint" title="Command palette">⌘K</span>
          <button type="button" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">◐</button>
          <button type="button" id="btn-prefs" title="Preferences" aria-label="Preferences">⚙</button>
          <button type="button" id="btn-about" title="About">About</button>
          <div id="status" data-kind="connecting">connecting…</div>
        </div>
      </header>

      <main id="split">
        <aside id="filetree" class="pane" aria-label="Workspace files" hidden>
          <div id="filetree-header">
            <span id="filetree-title">Scratch</span>
          </div>
          <ul id="filetree-list" role="tree" aria-label="Open files"></ul>
        </aside>
        <section id="editor-pane" class="pane" aria-label="Editor"></section>
        <div class="koi-resizer" id="split-resizer" aria-hidden="true"></div>
        <section id="right" class="pane" aria-label="Inspector">
          <div id="tabs" role="tablist" aria-label="Right panel views">
            <button type="button" class="tab" id="tab-preview" role="tab" data-view="preview" aria-selected="true">
              Emitted Preview
            </button>
            <button type="button" class="tab" id="tab-glossary" role="tab" data-view="glossary" aria-selected="false">
              Glossary
            </button>
            <button type="button" class="tab" id="tab-contextmap" role="tab" data-view="contextmap" aria-selected="false">
              Context Map
            </button>
            <button type="button" class="tab" id="tab-outline" role="tab" data-view="outline" aria-selected="false">
              Outline
            </button>
            <button type="button" class="tab" id="tab-check" role="tab" data-view="check" aria-selected="false">
              Check
            </button>
            <button type="button" id="btn-refresh" class="tab-refresh" title="Refresh this view">↻</button>
          </div>
          <div id="views">
            <div id="view-preview" class="view" role="tabpanel"></div>
            <div id="view-glossary" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-contextmap" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-outline" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-check" class="view doc-view" role="tabpanel" hidden></div>
          </div>
        </section>
      </main>

      <footer id="diagnostics" aria-label="Diagnostics"></footer>
    </div>
  </body>
</html>
