<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/koine-mark.svg" />
    <!-- iOS add-to-home-screen icon + standalone web-app hints. The PWA manifest link and theme-color
         are injected by pwaManifestPlugin (vite.config.ts) so they honour the deployment base; these
         apple-* tags are static because iOS ignores the manifest for the home-screen icon/title. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Koine" />
    <!-- viewport-fit=cover lets the standalone PWA paint under the iOS notch/home-indicator; the app
         chrome uses env(safe-area-inset-*) for its padding. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Koine Studio — write a bounded context's ubiquitous language once and generate idiomatic, self-contained code (C#, TypeScript, Python, PHP) with live diagnostics, a domain diagram and an AI domain copilot."
    />
    <title>Koine Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <!-- Starts hidden so the editor never paints before the boot switch (main.ts) resolves the route:
         on a pristine load the Home route shows and #app is revealed only on the editor route. This is
         the belt-and-braces half of the IDE→Home flash fix (#368) — even if a frame slips in before
         bootStudio runs, it can't be a frame of the wrong view. -->
    <div id="app" hidden>
      <!-- Topbar. Per the single-home contract (docs/shell-bars-contract.md, #756) this bar owns
           ACTIONS + transient action-feedback: the model-action buttons (New/Open/Generate/Save/Check),
           theme/settings/palette, install/update affordances, and the #status action-feedback pill.
           Persistent ambient state (connection, validity, problems, compiling, context, version,
           unsaved) lives in #statusbar instead — one home per fact, nothing mirrored across both bars. -->
      <header id="toolbar">
        <button type="button" id="btn-home" class="brand" title="Back to the start screen" aria-label="Back to the start screen">
          <!-- Monogram injected from the shared koineMark() template at startup (see ide.ts) so the
               app's marks have a single source; only the favicon SVG is a separate literal-colour copy. -->
          <span class="brand-logo" aria-hidden="true"></span>
          <!-- The wordmark is decorative chrome; the button's accessible name comes from aria-label
               ("Back to the start screen"), so hide the visible brand text from the a11y tree to
               satisfy WCAG 2.5.3 (Label in Name). -->
          <span class="brand-text" aria-hidden="true">
            <span class="brand-name">Koine</span>
            <span class="brand-eyebrow">Studio</span>
          </span>
        </button>

        <!-- Icon actions (chrome v2, #923): New · Open · Undo/Redo, icon-only ghost buttons. The former
             labelled New/Open/Generate/Save/Check row collapsed to this calm set — Save-to-disk, Check and
             the theme toggle now live in the ⌘K command palette (and the mobile overflow), not the bar. -->
        <div class="iconset" role="toolbar" aria-label="Model actions">
          <button type="button" id="btn-new" class="t-ico" title="Start a new empty model (prompts if you have unsaved changes)" aria-label="New model">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3.4v9.2M3.4 8h9.2" /></svg>
          </button>
          <button type="button" id="btn-open-folder" class="t-ico" title="Open a folder of .koi models" aria-label="Open folder">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M2.2 4.3c0-.7.5-1.3 1.2-1.3h2.9l1.3 1.6h4.9c.7 0 1.3.6 1.3 1.3v6c0 .7-.6 1.2-1.3 1.2H3.4c-.7 0-1.2-.5-1.2-1.2z" /></svg>
          </button>
          <!-- Undo/Redo: the <HistoryControls> Preact panel renders its two ghost icon buttons here. -->
          <div id="history-controls-host"></div>
        </div>

        <!-- Command bar (chrome v2, #923): the centered hero. A full command field that opens the ⌘K
             palette — it replaces both the old keycap-only palette hint AND the second-tier context
             breadcrumb strip (context now lives in the left Domain navigator + the status-bar segment).
             Keeps the .palette-hint hook so commandWiring binds it; commandWiring fills #cmd-kbd with the
             platform chord (⌘K / Ctrl+K). -->
        <button type="button" id="palette-hint" class="cmd palette-hint" title="Search commands, symbols, files (⌘K)" aria-label="Open command palette">
          <svg class="cmd-ico" viewBox="0 0 16 16" aria-hidden="true"><circle cx="7" cy="7" r="4.2" /><path d="M10.2 10.2 14 14" /></svg>
          <span class="cmd-placeholder" aria-hidden="true">Search commands, symbols, files…</span>
          <span class="cmd-kbd" data-role="cmd-kbd" aria-hidden="true"></span>
        </button>

        <div class="toolbar-right">
          <!-- Service-worker update affordance (#443). Hidden until koine-studio-sw.js detects a newly
               deployed build, then revealed by connectUpdateAffordance (src/shell/serviceWorkerUpdate.ts):
               a non-blocking "reload to update" so an installed PWA never gets stuck on a stale offline
               cache. Reuses the install affordance's classes (focusable buttons, AA contrast); the "×"
               hides it for the session. The reveal is announced to assistive tech through the shared
               polite live region (#522, src/shell/liveRegion.ts) — so no inline role=status/aria-live
               here, which would double-announce alongside the shared region. -->
          <div id="sw-update" class="install-affordance" hidden>
            <button type="button" id="btn-sw-reload" class="install-btn" aria-label="Update Koine Studio — reload for the new version" title="A new version is available — reload to update">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M13 8a5 5 0 1 1-1.5-3.6M13 2.4V5h-2.6" /></svg>
              <span class="install-btn-label">Update</span>
            </button>
            <button type="button" id="btn-sw-dismiss" class="install-dismiss icon-btn" aria-label="Dismiss update notice" title="Dismiss">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M4.5 4.5l7 7M11.5 4.5l-7 7" /></svg>
            </button>
            <span class="tb-divider" aria-hidden="true"></span>
          </div>
          <!-- Dismissible, event-gated PWA install affordance (#442). Hidden until the browser fires
               beforeinstallprompt (Chromium only; never on iOS/Safari or when already installed), then
               revealed by connectInstallAffordance (src/shell/pwaInstall.ts). The "×" persists a
               dismissal so it never nags. Never auto-prompts — prompt() runs only from the Install click. -->
          <div id="install-affordance" class="install-affordance" hidden>
            <button type="button" id="btn-install" class="install-btn" aria-label="Install Koine Studio" title="Install Koine Studio">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.6v6.8M5.2 6.8 8 9.6l2.8-2.8M3.4 12.6h9.2" /></svg>
              <span class="install-btn-label">Install</span>
            </button>
            <button type="button" id="btn-install-dismiss" class="install-dismiss icon-btn" aria-label="Dismiss install prompt" title="Dismiss">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M4.5 4.5l7 7M11.5 4.5l-7 7" /></svg>
            </button>
            <!-- Trailing divider lives INSIDE the affordance so it hides together with it; otherwise it
                 would orphan as a leading divider for the majority of users (Safari/iOS, already
                 installed, or dismissed), where the affordance is `display:none`. -->
            <span class="tb-divider" aria-hidden="true"></span>
          </div>
          <!-- Emit-target selector (chrome v2, #923): the <EmitTargetSelector> Preact panel mounts here,
               bound to the previewTarget project setting. -->
          <div id="emit-target-host"></div>
          <button type="button" id="btn-generate-project" class="generate" title="Generate a downloadable project" aria-label="Generate project">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.6v6.8M5.2 6.8 8 9.6l2.8-2.8M3.4 12.6h9.2" /></svg>
            Generate
          </button>
          <button type="button" id="btn-prefs" class="icon-btn" title="Settings" aria-label="Settings">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M2.5 5.5h11M2.5 10.5h11" />
              <circle cx="6" cy="5.5" r="1.7" />
              <circle cx="10" cy="10.5" r="1.7" />
            </svg>
          </button>
          <!-- Mobile overflow "More" (⋮) menu (#528). Hidden on desktop; the
               @media (max-width: $bp-narrow) block in _toolbar.scss reveals it and hides the secondary
               inline actions (Save/Check/Install/⌘K/theme/Settings), which this kebab then collects into a
               floating menu (wired in ide.tsx → toolbarOverflow.ts) so every action stays reachable on a
               phone. -->
          <button type="button" id="btn-toolbar-overflow" class="icon-btn" title="More actions" aria-label="More actions" aria-haspopup="menu" aria-expanded="false" hidden>
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="3.2" r="1.15" fill="currentColor" stroke="none" />
              <circle cx="8" cy="8" r="1.15" fill="currentColor" stroke="none" />
              <circle cx="8" cy="12.8" r="1.15" fill="currentColor" stroke="none" />
            </svg>
          </button>
          <!-- The action-feedback pill: the topbar's transient last-action toast (Saved / Renamed X→Y /
               errors), driven by setStatus(text, kind) — NOT a connection indicator (connection lives
               solely in #sb-connection; see docs/shell-bars-contract.md). Boots neutral/empty (hidden via
               `#status:empty`) so it can't impersonate the connection indicator at the first frame (#756);
               role=status + aria-live=polite announce action feedback only. -->
          <div id="status" role="status" aria-live="polite"></div>
        </div>
      </header>

      <main id="split">
        <!-- One left sidebar, one scroll bar: a DDD "Domain" navigator with a labelled Domain·Files axis
             switch over one navigator host (the Domain construct tree or the workspace file tree). The rail
             is the single scroll container. Its inner markup is the LeftRail Preact component
             (src/shell/LeftRail.tsx), rendered here by ide.tsx's boot BEFORE any el(...) lookup — keep this
             <aside> a thin shell so the two can't drift. -->
        <aside id="leftrail" class="pane" aria-label="Workspace"></aside>
        <div class="koi-resizer" id="leftrail-resizer" aria-hidden="true"></div>

        <!-- Center: Visual (the diagram) / Code (the editor plus the generated code, the compatibility
             check and the assistant) / Documentation (the glossary, renderGlossary). The bottom strip
             (Problems / Events / Relationships / Context Map) lives INSIDE the center, under the canvas
             or editor, so it serves both Visual and Code (and is hidden on Documentation); Properties and
             the left sidebar therefore span full height. -->
        <section id="center" class="pane" aria-label="Editor">
          <!-- Deck v2 bar (Overview toggle + Canvas·Code·Output·Docs filmstrip + keyboard hint). The
               DeckBar Preact component renders here; the DeckStage renders into #center-body and hosts
               each center surface in its card body. -->
          <div id="deck-bar"></div>
          <div id="center-body">
            <!-- The four center surfaces. The DeckStage re-parents each into its deck card at boot; the
                 facet sub-strips (Editor/Scenarios, Generated/Compatibility/Context Map, Glossary/…) moved
                 into the card headers, so the in-host tab rows are gone — only the body sub-views remain. -->
            <section id="center-visual" class="center-host" aria-label="Canvas">
              <div id="canvas-palette-host"></div>
              <div id="diagram-host"></div>
            </section>
            <!-- Code = where you author: the .koi editor + the scenario runner. -->
            <section id="center-technical" class="center-host" aria-label="Code" hidden>
              <div id="tech-body">
                <section id="editor-pane" class="tech-view" aria-label="Editor"></section>
                <div id="view-scenarios" class="tech-view" hidden></div>
              </div>
            </section>
            <!-- Output = what the compiler produces: Generated source, the Compatibility check, the Context Map. -->
            <section id="center-output" class="center-host" aria-label="Output" hidden>
              <div id="output-body">
                <div id="view-preview" class="tech-view"></div>
                <div id="view-check" class="tech-view doc-view" hidden></div>
                <div id="panel-contextmap" class="tech-view doc-view" hidden></div>
              </div>
            </section>
            <!-- Documentation = Glossary (the ubiquitous language) + Decisions (ADRs) + Notes. -->
            <section id="center-docs" class="center-host" aria-label="Documentation" hidden>
              <div id="docs-body">
                <div id="view-glossary" class="tech-view doc-view"></div>
                <div id="view-docs" class="tech-view doc-view" hidden></div>
                <div id="view-notes" class="tech-view doc-view" hidden></div>
              </div>
            </section>
          </div>

          <!-- Settings (#482): a transient, gear-launched overlay over the deck — NOT a deck surface and
               not restorable. A SIBLING of #center-body (which the DeckStage renders into and owns), so it
               survives the stage render. The toolbar gear shows it via the store's `settingsOpen`; the
               chrome hides #center-body while it's up, leaving the deck-bar as the way back. -->
          <section id="center-panel-settings" class="settings-page" role="dialog" aria-modal="true" aria-label="Settings" hidden>
            <header id="settings-page-header" class="settings-page-header">
              <h2 class="settings-page-title">Settings</h2>
              <div class="settings-page-header-controls">
                <div id="settings-scope-toggle" class="settings-scope-toggle"></div>
                <div id="settings-mode-toggle" class="settings-mode-toggle"></div>
              </div>
            </header>
            <div id="settings-page-body" class="settings-page-body"></div>
          </section>

          <footer id="diagnostics" aria-label="Problems, events and relationships">
            <div class="koi-resizer koi-resizer-y" id="diag-resizer" aria-hidden="true"></div>
            <div id="diag-header">
              <button type="button" id="diag-collapse" class="diag-collapse" aria-expanded="true" aria-controls="diag-body panel-events panel-relationships panel-terminal panel-review" aria-label="Collapse panel">
                <svg class="diag-chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6.5 8 10 12 6.5" /></svg>
              </button>
              <div class="diag-tabs" role="tablist" aria-label="Bottom panel">
                <button type="button" class="diag-tab" id="tab-problems" role="tab" data-panel="problems" aria-selected="true" aria-controls="diag-body">Problems</button>
                <button type="button" class="diag-tab" id="tab-events" role="tab" data-panel="events" aria-selected="false" aria-controls="panel-events">Events</button>
                <button type="button" class="diag-tab" id="tab-relationships" role="tab" data-panel="relationships" aria-selected="false" aria-controls="panel-relationships">Relationships</button>
                <button type="button" class="diag-tab" id="tab-terminal" role="tab" data-panel="terminal" aria-selected="false" aria-controls="panel-terminal">Terminal</button>
                <button type="button" class="diag-tab" id="tab-review" role="tab" data-panel="review" aria-selected="false" aria-controls="panel-review">Review</button>
              </div>
              <span id="diag-count" class="diag-count"></span>
            </div>
            <div id="diag-body" class="diag-panel" role="tabpanel" aria-labelledby="tab-problems"></div>
            <div id="panel-events" class="diag-panel" role="tabpanel" aria-labelledby="tab-events" hidden></div>
            <div id="panel-relationships" class="diag-panel" role="tabpanel" aria-labelledby="tab-relationships" hidden></div>
            <div id="panel-terminal" class="diag-panel diag-panel-terminal" role="tabpanel" aria-labelledby="tab-terminal" hidden></div>
            <div id="panel-review" class="diag-panel" role="tabpanel" aria-labelledby="tab-review" hidden></div>
          </footer>
        </section>
        <div class="koi-resizer" id="split-resizer" aria-hidden="true"></div>

        <!-- Right rail: the element inspector. Properties is the live editor; AI Chat and Source Control
             dock here too (the #right-strip stripe switches between them). The Rules and Notes tabs were
             retired in #730 — a selected element's invariants now surface in the Properties panel's
             Invariants section, and model Notes live in the center Deck's Docs surface. Any future
             not-yet-ready surface is hidden via panelGate (src/shell/panelGate.ts), never a bare
             "Coming soon" placeholder. -->
        <aside id="right" class="pane" aria-labelledby="right-title">
          <!-- Tool-window title header: the right-edge icon stripe (#right-strip) is the sole view
               switcher, so the panel needs only a title naming the active tool window — not a second,
               redundant tab row. inspectorController keeps #right-title in sync with the active RightView. -->
          <header id="right-header">
            <h2 id="right-title">Properties</h2>
          </header>
          <div id="right-body">
            <div id="inspector-host" class="rview" role="tabpanel"></div>
            <!-- The AI copilot — docked here in the right rail so it stays open beside Code/Canvas. The
                 AssistantPanel is mounted into this host lazily on first show (ide.tsx → ensureAssistant). -->
            <section id="view-assistant" class="rview" role="tabpanel" aria-label="AI Chat" hidden></section>
            <!-- The Source Control panel (#272) is painted by inspectorController on the first tab open
                 (SourceControlPanel mounts the git surface). The static content below is a pre-hydration
                 fallback, replaced once the controller hydrates. -->
            <div id="rview-source-control" class="rview doc-view" role="tabpanel" hidden>
              <div class="koi-rview-empty">
                <h3 class="koi-rview-empty-title">Source control</h3>
                <p class="muted">Loading source control…</p>
              </div>
            </div>
          </div>
        </aside>

        <!-- Right-edge tool-window stripe (#500): a slim, always-on Rider-style bar of icon toggles —
             one per right-rail view — that open/close (and switch) the #right Properties panel. The
             buttons are the RightStrip Preact component (src/shell/RightStrip.tsx), rendered at boot;
             inspectorController wires the toggle/switch behaviour and the live aria-pressed state.
             Desktop-only — hidden below $bp-narrow, where the inspector bottom-sheet (#221) owns
             Properties. -->
        <div id="right-strip" class="pane" role="toolbar" aria-label="Tool windows" aria-orientation="vertical"></div>
      </main>

      <!-- Bottom status bar. Per the single-home contract (docs/shell-bars-contract.md, #756) this bar
           owns PERSISTENT AMBIENT STATE read passively: active context, model validity, workspace
           problems, busy/compiling, connection, version, and unsaved work. #sb-connection is the SOLE
           connection indicator (not a mirror of the topbar #status pill — that pill is transient
           action-feedback). One home per fact; urgency escalates an item in place, never mirrored up. -->
      <footer id="statusbar" aria-label="Model status">
        <!-- Branch (chrome v2, #923): the workspace's git branch. The <BranchIndicator> panel fills the
             name and reveals it once a git folder reports a branch (hidden otherwise). -->
        <button type="button" class="sb-seg" id="sb-branch" title="Current git branch" hidden>
          <svg class="sb-ico" viewBox="0 0 16 16" aria-hidden="true"><circle cx="5" cy="4" r="1.6" /><circle cx="5" cy="12" r="1.6" /><circle cx="11" cy="6.4" r="1.6" /><path d="M5 5.6v4.8M5 8.6h3.6a2 2 0 0 0 2-2v-.6" /></svg>
          <span data-role="branch-name"></span>
        </button>
        <!-- Problems (active file), split ✕ errors / ⚠ warnings, colour-coded; opens the Problems tab.
             editorSession fills the two counts from the same diagnosticsSummary the strip uses (#923,
             replacing the old single "No errors" #sb-validity readout). -->
        <button type="button" class="sb-seg" id="sb-problems" title="Open the Problems tab">
          <span class="sb-err" id="sb-problems-errors">✕ 0</span>
          <span class="sb-warn" id="sb-problems-warnings">⚠ 0</span>
        </button>
        <!-- Active bounded context (single home; the top-bar breadcrumb strip was removed in #923). -->
        <span class="sb-seg sb-ctx" id="sb-context">Context: —</span>
        <!-- Docs coverage ring (glossary documentation, #923): a transparent host (display:contents) — the
             <DocsCoverageRing> panel renders its own .sb-ring segment inside it, like the other panel hosts. -->
        <span id="sb-docs-ring"></span>
        <!-- Workspace-wide problems rollup (every file, not just the active one). Empty when clean;
             the <WorkspaceProblemsBadge> Preact panel renders its span in here. -->
        <span id="sb-problems-host"></span>
        <!-- Global unsaved-work indicator (#193): the clickable "N unsaved" pill that triggers Save-all.
             Still the <UnsavedIndicator> Preact panel's element — the `el('unsaved-indicator')` mount and
             its tests are unchanged. -->
        <button type="button" id="unsaved-indicator" class="unsaved-indicator" hidden></button>
        <span class="sb-spacer"></span>
        <!-- Transient "compiling…" indicator (#516): the <CompilingIndicator> Preact panel renders its
             aria-live span in here while a compile is in flight (debounced), hidden when idle. -->
        <span id="sb-compiling-host"></span>
        <!-- Emit target echo (#923): mirrors the top-bar selector's value. The <EmitEcho> panel renders here. -->
        <span class="sb-seg sb-emit" id="sb-emit"></span>
        <!-- Cursor position (#923): editorSession writes Ln/Col from the editor selection. -->
        <span class="sb-seg static" id="sb-cursor">Ln 1, Col 1</span>
        <!-- Encoding (#923): .koi files are UTF-8. -->
        <span class="sb-seg static" id="sb-encoding">UTF-8</span>
        <!-- Ready / connection — the SOLE connection indicator (#756). editorSession's setConnection
             drives the text + state (green dot when ready). -->
        <span class="sb-seg sb-ready" id="sb-connection">Connecting…</span>
        <span class="sb-seg static" id="sb-version"></span>
      </footer>

      <!-- Narrow-viewport (mobile) zone switcher: hidden on desktop, a fixed bottom ARIA-tablist bar
           below $bp-narrow. The <MobileZoneBar> Preact panel renders here (see ide.tsx); selecting a tab
           writes the uiChrome slice's mobileZone, which is mirrored onto #split[data-mobile-zone]. -->
      <nav id="mobile-zone-bar-host" aria-label="Studio zone switcher"></nav>

      <!-- Narrow-viewport (mobile) inspector bottom sheet (#221): the single Properties surface below
           $bp-narrow, replacing the fixed #right rail on a phone. createInspectorSheet (inspectorController)
           mounts its peek/half/full dialog + backdrop in here; hidden (display:none) on desktop. -->
      <div id="inspector-sheet-host"></div>
    </div>

    <!-- The routed Home view mounts here (mountHome). The boot switch (main.ts) shows exactly one of
         #app / #home-root per route, so Home and the editor never paint at once (issue #368). Starts
         hidden; the boot reveals whichever the resolved route needs before first paint — and a plain
         open always resolves to Home, never auto-skipping a returning user into the editor (issue #766). -->
    <div id="home-root" hidden></div>
  </body>
</html>
