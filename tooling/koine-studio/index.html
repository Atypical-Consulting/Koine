<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/koine-mark.svg" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koine Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header id="toolbar">
        <div class="brand">
          <span class="brand-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Koine">
              <defs>
                <linearGradient id="koi-grad-h" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="var(--koi-accent)" />
                  <stop offset="1" stop-color="var(--koi-cyan)" />
                </linearGradient>
              </defs>
              <rect x="1" y="1" width="30" height="30" rx="8.5" fill="url(#koi-grad-h)" />
              <rect x="1.6" y="1.6" width="28.8" height="28.8" rx="8" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1" />
              <g fill="var(--koi-on-accent)" transform="translate(6.7,4.7) scale(0.86)">
                <rect x="2" y="3" width="4.4" height="22" rx="1.6" />
                <path d="M8.2 13.6 18 3h5.6l-9.5 10.3L24 25h-5.9l-7.8-9.3-2.1 2.2z" />
              </g>
            </svg>
          </span>
          <span class="brand-text">
            <span class="brand-name">Koine</span>
            <span class="brand-eyebrow">Studio</span>
          </span>
        </div>

        <div class="toolbar-actions" role="toolbar" aria-label="Model actions">
          <div class="tb-group">
            <button type="button" id="btn-new">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 3.4v9.2M3.4 8h9.2" /></svg>
              New
            </button>
            <button type="button" id="btn-open-folder">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M2.2 4.3c0-.7.5-1.3 1.2-1.3h2.9l1.3 1.6h4.9c.7 0 1.3.6 1.3 1.3v6c0 .7-.6 1.2-1.3 1.2H3.4c-.7 0-1.2-.5-1.2-1.2z" /></svg>
              Open
            </button>
          </div>
          <span class="tb-divider" aria-hidden="true"></span>
          <div class="tb-group">
            <div class="lang-split" role="group" aria-label="Destination language">
              <button type="button" id="btn-preview-run" class="tb-primary lang-run" title="Preview C# (⌘1)">
                <span class="lang-dot" data-lang="csharp" aria-hidden="true"></span>
                <span class="lang-run-label" id="lang-current-label">C#</span>
              </button>
              <button type="button" id="btn-lang-menu" class="tb-primary lang-caret" aria-haspopup="menu" aria-expanded="false" aria-label="Choose destination language" title="Choose destination language">
                <svg class="tb-ico lang-caret-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6.5 8 10 12 6.5" /></svg>
              </button>
            </div>
            <button type="button" id="btn-generate-project" class="tb-primary" title="Generate a downloadable project">
              <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.6v6.8M5.2 6.8 8 9.6l2.8-2.8M3.4 12.6h9.2" /></svg>
              Generate
            </button>
          </div>
          <span class="tb-divider" aria-hidden="true"></span>
          <button type="button" id="btn-check">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8.4 6.4 12 13 4.4" /></svg>
            Check
          </button>
        </div>

        <div class="toolbar-right">
          <span class="palette-hint" title="Command palette">⌘K</span>
          <span class="tb-divider" aria-hidden="true"></span>
          <button type="button" id="btn-theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="5.5" />
              <path d="M8 2.5a5.5 5.5 0 0 0 0 11z" fill="currentColor" stroke="none" />
            </svg>
          </button>
          <button type="button" id="btn-prefs" class="icon-btn" title="Preferences" aria-label="Preferences">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M2.5 5.5h11M2.5 10.5h11" />
              <circle cx="6" cy="5.5" r="1.7" />
              <circle cx="10" cy="10.5" r="1.7" />
            </svg>
          </button>
          <button type="button" id="btn-about" class="icon-btn" title="About Koine Studio" aria-label="About">
            <svg class="tb-ico" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="5.8" />
              <path d="M8 7.3v3.4" />
              <circle cx="8" cy="4.9" r="0.9" fill="currentColor" stroke="none" />
            </svg>
          </button>
          <div id="status" data-kind="connecting" role="status" aria-live="polite">connecting…</div>
        </div>
      </header>

      <main id="split">
        <aside id="filetree" class="pane" aria-label="Workspace files" hidden>
          <div id="filetree-header">
            <span id="filetree-title">Scratch</span>
          </div>
          <div id="filetree-body"></div>
        </aside>
        <section id="editor-pane" class="pane" aria-label="Editor"></section>
        <div class="koi-resizer" id="split-resizer" aria-hidden="true"></div>
        <section id="right" class="pane" aria-label="Inspector">
          <div id="tabs" role="tablist" aria-label="Right panel views">
            <button type="button" class="tab" id="tab-preview" role="tab" data-view="preview" aria-selected="true">
              Emitted Preview
            </button>
            <button type="button" class="tab" id="tab-glossary" role="tab" data-view="glossary" aria-selected="false">
              Glossary
            </button>
            <button type="button" class="tab" id="tab-diagrams" role="tab" data-view="diagrams" aria-selected="false">
              Diagrams
            </button>
            <button type="button" class="tab" id="tab-contextmap" role="tab" data-view="contextmap" aria-selected="false">
              Context Map
            </button>
            <button type="button" class="tab" id="tab-outline" role="tab" data-view="outline" aria-selected="false">
              Outline
            </button>
            <button type="button" class="tab" id="tab-assistant" role="tab" data-view="assistant" aria-selected="false">
              Assistant
            </button>
            <button type="button" class="tab" id="tab-check" role="tab" data-view="check" aria-selected="false">
              Check
            </button>
            <button type="button" id="btn-refresh" class="tab-refresh" title="Refresh this view">↻</button>
          </div>
          <div id="views">
            <div id="view-preview" class="view" role="tabpanel"></div>
            <div id="view-glossary" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-diagrams" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-contextmap" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-outline" class="view doc-view" role="tabpanel" hidden></div>
            <div id="view-assistant" class="view" role="tabpanel" hidden></div>
            <div id="view-check" class="view doc-view" role="tabpanel" hidden></div>
          </div>
        </section>
      </main>

      <footer id="diagnostics" aria-label="Diagnostics"></footer>
    </div>
  </body>
</html>
