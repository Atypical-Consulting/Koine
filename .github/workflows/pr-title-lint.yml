name: PR title lint

# PRs are squash-merged, so the PR title becomes the commit message on main. release-please parses
# that message to derive the next semantic version (adr/0002-conventional-commits-and-automated-semver.md),
# so a non-conforming title is rejected here before merge rather than silently producing no release.

on:
  pull_request_target:
    # A code push (`synchronize`) can't change the PR title, so re-linting on it is wasted
    # work; lint only when the title can actually change (open/edit) or a closed PR reopens.
    # ready_for_review is included so the draft gate below re-evaluates when a draft PR flips
    # to ready — otherwise a title set while in draft never gets linted for real (issue #1481).
    types: [opened, edited, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  lint-pr-title:
    # Skip draft PRs — a draft's title isn't final yet, so don't flag it before the author is ready.
    # This gate only re-evaluates if the trigger's `types:` above includes `ready_for_review` —
    # dropping it would let a ready-flip merge with this check permanently SKIPPED (issue #1481).
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned: this runs under pull_request_target with `pull-requests: write`, so a
      # mutable tag is the highest-value pin. Renovate keeps the digest current (see
      # renovate.json's helpers:pinGitHubActionDigests).
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
