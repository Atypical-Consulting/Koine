name: Wasm AOT smoke

# Scheduled smoke test of the AOT-compiled browser-wasm bundle (issue #471).
#
# The per-push CI gate (ci.yml, "Smoke-test the published wasm bundle") drives the whole
# [JSExport] surface, but against the DEFAULT (interpreter) publish — kept fast for the PR loop.
# The DEPLOYED bundle is AOT-compiled (-p:KoineWasmAot=true, ~24-32 s slower; set by the
# deploy-docs.yml deploy job). PublishTrimmed/TrimMode=full are identical across both modes, so the
# trim/reflection-rooting breakage the smoke test guards is mode-independent and already caught by the
# interpreter gate; the AOT bundle's BOOT is covered by the Studio browser smoke (koine-studio.yml).
# The residual gap is an AOT-codegen-only regression on a non-boot reflection path — a method the AOT
# compiler drops/mis-compiles but the interpreter keeps. This run closes it OFF the PR path, so the
# AOT publish cost is irrelevant. The smoke test itself is UNCHANGED (it imports whatever AppBundle is
# published — interpreter or AOT); only the publish flag differs from ci.yml's step.

on:
  # Nightly — a low-probability, AOT-only regression surfaces within a day. Retune the cadence freely.
  schedule:
    - cron: '17 4 * * *'
  # Run on demand from the Actions UI or `gh workflow run wasm-aot-smoke.yml`.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aot-smoke:
    runs-on: ubuntu-latest
    # Backstop so a hung wasm publish/smoke step can't run to the 6-hour default. The AOT
    # publish is ~24-32 s slower than interpreter but still finishes in a few minutes warm.
    timeout-minutes: 30
    # See ci.yml's build-and-test job for why (issue #1552): cheap insurance against a runner that
    # gets reused sharing a wedged MSBuild node with this job's `dotnet publish`.
    env:
      MSBUILDDISABLENODEREUSE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Mirror ci.yml's wasm toolchain via the shared setup-dotnet-wasm composite
      # (setup-dotnet -> NuGet cache -> wasm cache -> install wasm workloads) so the
      # scheduled job and the per-push job can't drift.
      - name: Setup .NET + wasm
        uses: ./.github/actions/setup-dotnet-wasm

      # The smoke test runs under Node against the published AppBundle.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      # AOT-publish the bundle the docs site actually deploys, then drive the WHOLE [JSExport]
      # surface against it under Node. -p:KoineWasmAot=true is the only flag that differs from ci.yml's
      # interpreter publish (the csproj already gates WasmStripILAfterAOT on it). A red exit fails the
      # job; the same run prints the pizzeria compile benchmark's `elapsed=` line for the log.
      - name: AOT-publish + smoke-test the wasm bundle
        run: |
          dotnet publish src/Koine.Wasm -c Release -p:KoineWasmAot=true
          node src/Koine.Wasm/smoke-test.mjs
