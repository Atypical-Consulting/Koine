name: release-please

# Derives the next semantic version from Conventional Commits on every push to main and keeps a
# release PR up to date (bumping Directory.Build.props + CHANGELOG.md). Merging that PR tags
# vX.Y.Z; the release-please-action's `release_created` output then gates the cli-binaries and
# nupkg jobs below, which build and attach release assets in this same workflow run. (A
# tag-triggered workflow can't do this: GITHUB_TOKEN-created tags/releases don't fire
# `on: push: tags` / `on: release`.) See adr/0002-conventional-commits-and-automated-semver.md.

on:
  push:
    branches: [main]
  # Manual dry-run: builds the CLI/Studio matrices without uploading (release_created is false
  # off a dispatch, so every upload step is skipped). Use to validate the build path pre-release.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize release-please runs. The bootstrap job below does `git push origin HEAD:main`
# and tags a baseline, so two overlapping runs could race on the tag/manifest. Never cancel
# an in-progress run (cancelling mid-push could leave the tag/commit half-applied).
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  # One-time bootstrap: the first push to main with no v* tag yet replays the full Conventional
  # Commits history (scripts/release/compute-historical-version.py) to seed the real baseline
  # version instead of a hand-picked one, tags it, and updates the manifest/props to match. Once a
  # tag exists this is a permanent no-op and release-please's normal since-last-tag logic takes
  # over. See adr/0002-conventional-commits-and-automated-semver.md, decision 5.
  bootstrap-baseline:
    runs-on: ubuntu-latest
    # Backstop so a stuck git/python step can't run to the 6-hour default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - run: |
          set -euo pipefail
          if [ -n "$(git tag -l 'v*')" ]; then
            echo "a v* tag already exists — baseline already bootstrapped, skipping"
            exit 0
          fi

          version="$(python3 scripts/release/compute-historical-version.py HEAD)"
          echo "computed baseline version: $version"

          python3 scripts/release/set-baseline-version.py "$version"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release-please-manifest.json Directory.Build.props
          git commit -m "chore(release): bootstrap baseline version $version from Conventional Commits history"
          git tag "v$version"
          git push origin HEAD:main
          git push origin "v$version"

  release-please:
    needs: bootstrap-baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          target-branch: main

  # Self-contained, single-file CLI per OS, attached to the release. Reuses the existing
  # Properties/PublishProfiles/<rid>.pubxml (SelfContained, PublishSingleFile, trimming OFF).
  cli-binaries:
    name: cli (${{ matrix.rid }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-wasm
        with:
          install-wasm-workloads: false

      - name: Publish self-contained CLI
        run: dotnet publish src/Koine.Cli -p:PublishProfile=${{ matrix.rid }}

      - name: Archive (tar.gz, Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release-please.outputs.tag_name }}"
          tag="${tag:-dev}"
          out="koine-${tag}-${{ matrix.rid }}.tar.gz"
          tar -C "src/Koine.Cli/bin/publish/${{ matrix.rid }}" -czf "$out" koine
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - name: Archive (zip, Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          if (-not $tag) { $tag = "dev" }
          $out = "koine-$tag-${{ matrix.rid }}.zip"
          Compress-Archive -Path "src/Koine.Cli/bin/publish/${{ matrix.rid }}/koine.exe" -DestinationPath $out -Force
          "ASSET=$out" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload to release
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "$ASSET" --clobber

  # CLI packed as a .NET global tool, attached to the release. Folds in the (never-triggered)
  # release.yml pack. NuGet.org publish uses Trusted Publishing (OIDC) — no long-lived key — and stays
  # a no-op until a maintainer registers the trusted-publishing policy and sets the NUGET_USER secret.
  nupkg:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # upload the .nupkg as a release asset
      id-token: write # request the GitHub OIDC token for NuGet Trusted Publishing
    # Job-level so the publish steps' `if` can read it — a STEP-level env is NOT visible to that
    # same step's own `if` conditional. Empty until the maintainer sets the secret → steps no-op.
    env:
      NUGET_USER: ${{ secrets.NUGET_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-wasm
        with:
          install-wasm-workloads: false

      - name: Pack CLI
        run: dotnet pack src/Koine.Cli/Koine.Cli.csproj -c Release -o ./artifacts

      - name: Upload nupkg to release
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" ./artifacts/*.nupkg --clobber

      # Publish to NuGet.org so `dotnet tool install --global koine` works, via Trusted Publishing:
      # the login step exchanges the GitHub OIDC token (needs `id-token: write` above) for a short-lived
      # NuGet API key valid ~1h — no long-lived secret is stored. Both steps stay a clean no-op until a
      # maintainer registers the trusted-publishing policy on NuGet.org and sets the NUGET_USER secret
      # (the nuget.org profile name); the job-level env-indirection lets each `if` skip cleanly when it's
      # unset. Never runs on a workflow_dispatch dry-run (release_created is false there). Keep login
      # adjacent to the push so the ~1h key doesn't expire before it's used.
      - name: NuGet login (OIDC -> short-lived key)
        id: login
        if: ${{ needs.release-please.outputs.release_created == 'true' && env.NUGET_USER != '' }}
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ env.NUGET_USER }}

      # --skip-duplicate makes re-runs of the same release idempotent.
      - name: Push to NuGet
        if: ${{ needs.release-please.outputs.release_created == 'true' && env.NUGET_USER != '' }}
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  # Studio desktop installers (.dmg/.msi or NSIS .exe/.AppImage/.deb), UNSIGNED, attached to the
  # release. Reuses the same build as CI via the reusable workflow; publish only on a real release.
  studio-desktop:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
    uses: ./.github/workflows/studio-build.yml
    with:
      bundle: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
      publish: ${{ needs.release-please.outputs.release_created == 'true' }}
      tag: ${{ needs.release-please.outputs.tag_name }}
