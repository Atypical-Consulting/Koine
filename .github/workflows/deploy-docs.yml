name: Deploy docs to GitHub Pages

# Builds the Astro Starlight site in website/ and publishes it to GitHub Pages.
# Enable once under: repo Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build site
        # withastro/action installs deps (auto-detects the package manager),
        # runs `astro build`, and uploads the Pages artifact from website/dist.
        uses: withastro/action@v6
        with:
          path: ./website
          # Astro 6 / Starlight require Node >= 22.12 (the action defaults to 20).
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
