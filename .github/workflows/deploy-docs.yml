name: Deploy docs to GitHub Pages

# Builds the Astro Starlight site in website/ (including the in-browser Koine compiler, a
# .NET WebAssembly module) and publishes it to GitHub Pages.
# Enable once under: repo Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      # The Playground bundles the compiler to wasm, so compiler changes must redeploy.
      - 'src/**'
      # The browser edition of Koine Studio is built into the site at /Koine/studio/.
      - 'tooling/koine-studio/**'
      - 'Directory.Build.props'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # AOT-compile the DEPLOYED wasm bundle (issue #327). KOINE_WASM_AOT makes every build-wasm.mjs
    # invocation in this deploy publish with `-p:KoineWasmAot=true`, so the docs-site playground —
    # and the embedded Koine Studio at /Koine/studio/ (built via build-studio.mjs, which inherits
    # this env) — ship the faster AOT-compiled in-browser compiler. Scoped to this deploy job only:
    # the CI test build (ci.yml) and the per-PR studio-web validation (koine-studio.yml) stay on the
    # fast interpreter publish. Relies on the wasm-tools workload already installed below.
    env:
      KOINE_WASM_AOT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The Playground runs the Koine compiler as a .NET WebAssembly module; building it
      # needs the SDK plus the wasm workloads (emscripten + the browser-wasm runtime pack).
      # De-duplicated into the setup-dotnet-wasm composite (setup-dotnet -> NuGet cache ->
      # wasm cache -> install wasm workloads). KOINE_WASM_AOT above still drives the AOT
      # publish; the composite only installs the workloads, it does not publish.
      - name: Setup .NET + wasm
        uses: ./.github/actions/setup-dotnet-wasm

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Astro 7 / Starlight require Node >= 22.12.
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      # NOTE: no explicit wasm-publish step here on purpose. The Astro build below runs the website
      # `prebuild` chain (npm run build → prebuild → scripts/build-wasm.mjs), which publishes the AOT
      # bundle into website/public/koine-wasm/; build-studio.mjs then drives the studio's prebuild:web
      # → its own build-wasm.mjs, which REUSES that bundle via the `bundleIsFresh` guard (issue #342).
      # Net: the AOT bundle is published exactly once per deploy. Don't re-add an explicit publish
      # step — the guard would just skip it.
      #
      # (This step replaced `withastro/action@v6` so the boot smoke-test below can run BETWEEN the
      # build and the Pages artifact upload — the action does build+upload in one shot, leaving no
      # seam to gate on. The explicit npm ci + build + upload-pages-artifact chain is equivalent.)
      - name: Build site
        working-directory: ./website
        run: |
          npm ci
          npm run build

      # The compiler worker must actually boot in a real browser before we publish. The website's
      # vitest suite MOCKS the worker, so without this gate a worker-boot regression ships green — which
      # is exactly how #492 reached production ("Koine worker timed out after 30s": the #357/#358
      # channel-clobber un-ported to the website copy). This closes the "no browser-boot smoke test
      # gates the deploy" gap — the website equivalent of Studio's #358 smoke gate (koine-studio.yml).
      # Only Chromium is needed; --with-deps installs its Linux system libs.
      - name: Install Playwright Chromium (boot smoke-test)
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: ./website
          cache-key-files: website/package-lock.json

      - name: Boot smoke-test — the real Playground compiler boots in a browser (#492)
        working-directory: ./website
        run: npm run test:browser

      # Upload the Pages artifact from website/dist ONLY after the smoke test passes, so a worker that
      # can't boot can never be published. (The deploy job below consumes this `github-pages` artifact.)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
