name: Deploy docs to GitHub Pages

# Builds the Astro Starlight site in website/ (including the in-browser Koine compiler, a
# .NET WebAssembly module) and publishes it to GitHub Pages.
# Enable once under: repo Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      # The Playground bundles the compiler to wasm, so compiler changes must redeploy.
      - 'src/**'
      # The browser edition of Koine Studio is built into the site at /Koine/studio/.
      - 'tooling/koine-studio/**'
      - 'Directory.Build.props'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # AOT-compile the DEPLOYED wasm bundle (issue #327). KOINE_WASM_AOT makes every build-wasm.mjs
    # invocation in this deploy publish with `-p:KoineWasmAot=true`, so the docs-site playground —
    # and the embedded Koine Studio at /Koine/studio/ (built via build-studio.mjs, which inherits
    # this env) — ship the faster AOT-compiled in-browser compiler. Scoped to this deploy job only:
    # the CI test build (ci.yml) and the per-PR studio-web validation (koine-studio.yml) stay on the
    # fast interpreter publish. Relies on the wasm-tools workload already installed below.
    env:
      KOINE_WASM_AOT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The Playground runs the Koine compiler as a .NET WebAssembly module; building it
      # needs the SDK plus the wasm workloads (emscripten + the browser-wasm runtime pack).
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      # The wasm workloads (emscripten + browser-wasm runtime pack) are slow to
      # download; cache the SDK workload folders keyed on the SDK version.
      - name: Cache wasm workloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.dotnet/sdk-manifests
            ~/.dotnet/packs
            ~/.dotnet/metadata
            ~/.dotnet/sdk-advertising
          key: ${{ runner.os }}-wasm-workloads-${{ hashFiles('Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-wasm-workloads-

      - name: Install wasm workloads
        run: dotnet workload install wasm-tools wasm-experimental

      # Publishes src/Koine.Wasm and copies the AppBundle into website/public/koine-wasm/,
      # so the subsequent `astro build` bundles it into dist/. (Only needs dotnet + Node, no
      # npm deps — the Astro step below installs those.)
      - name: Build Koine wasm compiler module
        working-directory: ./website
        run: node scripts/build-wasm.mjs

      - name: Build site
        # withastro/action installs deps (auto-detects the package manager), runs the build,
        # and uploads the Pages artifact from website/dist.
        uses: withastro/action@v6
        with:
          path: ./website
          # Astro 6 / Starlight require Node >= 22.12 (the action defaults to 20).
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
