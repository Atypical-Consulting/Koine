name: CI

# Build, test, and verify the generated demo on every push and pull request.

on:
  push:
    branches: [main]
  pull_request:
    # Explicit so `ready_for_review` can be added below — the default types omit it, and
    # build-and-test's draft gate needs it to re-evaluate when a draft PR flips to ready
    # (issue #1481). opened/synchronize/reopened are the defaults, kept explicit here.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

# Cancel superseded runs on the same PR branch; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Does this PR need the .NET job at all? `build-and-test` is the long pole gating every merge, and on
  # a high-merge-volume day most PRs are front-end-only (Studio / koine-ui TypeScript) — each paying a
  # full .NET build + ~2900-test run + conformance + demo + wasm smoke for a compiler that cannot have
  # changed. One of the two PRs that burned a 30-minute timeout in issue #1486 (#1466) touched exactly
  # one file: a TypeScript test. This gate answers one question — "did anything outside the two
  # front-end packages change?" — so build-and-test can skip when the answer is no.
  #
  # Hand-rolled rather than a third-party paths-filter action (the plan floated dorny/paths-filter):
  # the rule is a single grep, it adds no supply-chain surface to a workflow that pins every action by
  # SHA, and — unlike picomatch's negation + predicate-quantifier semantics — it can be run against a
  # real PR and proven before it lands (it was: #1454 and #1466 → false, #1464 and #1526 → true).
  #
  # FAIL-OPEN by construction: `dotnet` reads 'false' only when the file list was fetched AND every
  # file in it is front-end. An empty list, a failed API call, an unexpected shape — all leave it
  # 'true' and the .NET job runs. The asymmetry is deliberate: a wrong 'true' wastes ~8 minutes, a
  # wrong 'false' merges a compiler change untested.
  changes:
    # Same draft gate as build-and-test below: while a PR is a draft the .NET job is skipped anyway, so
    # there is nothing for this gate to decide — and the fleet pushes a great many draft commits. The
    # `ready_for_review` trigger type (issue #1481) is what re-runs both on the ready-flip.
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
    steps:
      - name: Detect whether anything outside the front-end packages changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail

          # Ask for BOTH paths of every touched file. A rename reports only its NEW path under
          # `.filename`, so a file moved OUT of the .NET tree INTO tooling/koine-studio/ would look
          # front-end-only — and skip the very job that would have caught the removal on the .NET side.
          # `.previous_filename` closes that hole. Never abort on a bad API call: a transient blip must
          # fall through to 'true', not redden the PR.
          if ! files=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
                         --paginate --jq '.[] | .filename, (.previous_filename // empty)'); then
            files=""
          fi

          # GitHub's "list PR files" endpoint truncates at 3000 entries. A truncated list could hide a
          # .NET file behind 3000 front-end ones and produce a confidently wrong 'false', so cross-check
          # the listing against the PR's own file count and fail open if they disagree. (Renames add a
          # second path, so the listing may legitimately exceed changed_files — only a SHORTFALL is
          # evidence of truncation.)
          expected=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.changed_files' 2>/dev/null || true)
          # `gh api` prints the error BODY to stdout on a failed call, so `expected` can come back as a
          # JSON blob rather than a number. Force it to digits-or-empty, or the numeric test below dies
          # on it and the truncation guard silently stops guarding.
          case "${expected}" in ''|*[!0-9]*) expected="" ;; esac
          actual=$(printf '%s\n' "${files}" | grep -c . || true)

          if [ -z "${files}" ] || [ -z "${expected}" ] || [ "${actual}" -lt "${expected}" ]; then
            echo "::warning::Changed-file list unusable (got ${actual:-0} paths, PR reports ${expected:-?} files) — running build-and-test (fail-open)."
            echo "dotnet=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Changed paths (${actual}):"
          printf '%s\n' "${files}"
          outside=$(printf '%s\n' "${files}" | grep -vE '^tooling/koine-(studio|ui)/' || true)
          if [ -n "${outside}" ]; then
            echo "dotnet=true" >> "${GITHUB_OUTPUT}"
            echo "Files outside the front-end packages changed → build-and-test runs."
          else
            echo "dotnet=false" >> "${GITHUB_OUTPUT}"
            echo "Front-end-only PR (tooling/koine-studio, tooling/koine-ui) → build-and-test skipped."
          fi

  build-and-test:
    # Skip draft PRs — they're not ready for review/merge yet, so don't burn CI minutes on every push.
    # This gate only re-evaluates if the trigger's `types:` above includes `ready_for_review` —
    # dropping it would let a ready-flip merge with build-and-test permanently SKIPPED (issue #1481).
    #
    # …and skip front-end-only PRs, per the `changes` gate above (issue #1486). Two subtleties, both
    # load-bearing: (1) a job with `needs:` is skipped whenever that dependency is skipped — which
    # `changes` is on every push to main — so the condition needs a status function (`!cancelled()`)
    # just to be evaluated at all; (2) the test is `!= 'false'`, NOT `== 'true'`, so a gate that was
    # skipped, failed, or returned nothing still runs the .NET job. Only a positive "front-end-only"
    # verdict skips it. Inverting either of these would let a compiler change merge untested.
    needs: changes
    if: >-
      !cancelled()
      && (github.event_name != 'pull_request'
          || (github.event.pull_request.draft == false
              && needs.changes.outputs.dotnet != 'false'))
    runs-on: ubuntu-latest
    # Backstop so a hung step (stalled restore, wedged toolchain fetch) fails fast instead
    # of running to the 6-hour default. Cold build+test+demo lands well under this.
    timeout-minutes: 30
    # MSBuild's persistent build nodes are keyed by a pipe name derived from the toolset install, not
    # by working directory — on a machine that reuses runners (self-hosted, or a future matrix sharing
    # one box) a leftover node from a prior job could be picked up by this one and deadlock it the same
    # way concurrent git worktrees do locally (issue #1552). Disabling reuse here is cheap insurance.
    env:
      MSBUILDDISABLENODEREUSE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # De-duplicated .NET + wasm setup: setup-dotnet -> NuGet cache -> wasm-workload
      # cache -> install wasm workloads. See .github/actions/setup-dotnet-wasm. Koine.Wasm
      # targets the browser-wasm RID and is part of Koine.slnx, so the `dotnet build`/
      # `dotnet test` below need the WebAssembly workloads; without them the wasm project
      # fails to restore/build.
      - name: Setup .NET + wasm
        uses: ./.github/actions/setup-dotnet-wasm

      # Conformance toolchains (issue #240). Each non-C# emitter's conformance suite type-checks
      # its emitted output with the target's real tool. The suites that route through
      # TestSupport.RequireOrSkip (Php/Python/TypeScript/CrossEmitter/Rust *ConformanceTests*) report a
      # SKIPPED test when the tool is absent and — because the Test step sets KOINE_REQUIRE_CONFORMANCE=1
      # — a hard FAILURE in CI, so a toolchain dropping off the runner reddens the build instead of
      # passing silently. (The *SnapshotTests* in the same folder still log-and-pass on an absent
      # toolchain; converting them is tracked as a follow-up.) Tool versions are pinned so a release
      # can't redden the suite on an unrelated day with no source change; Rust tracks the stable channel
      # (as elsewhere in this repo), where the dependency-free `cargo check` fixtures are version-robust.
      #
      # Node + TypeScript: ResolveTsc() finds `tsc` on PATH (KOINE_TSC overrides), which a global
      # `npm i -g typescript` install satisfies, so `tsc --noEmit --strict` runs against emitted TS.
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Install TypeScript
        # Pin the major so a future tsc release tightening `--strict` inference
        # can't redden the conformance suite on an unrelated day with no source change.
        run: npm install -g typescript@6

      # PHP + phpstan: the PHP conformance suite runs `php -l` (syntax) and
      # `phpstan analyse --level max` (type-check) over emitted PHP. setup-php puts both `php`
      # and `phpstan` on PATH (KOINE_PHP / KOINE_PHPSTAN override).
      - name: Setup PHP + phpstan
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          tools: phpstan:2

      # Python + mypy: the Python conformance suite runs `ast.parse` (syntax) and
      # `mypy --strict` (type-check) over emitted Python. ResolvePython() prefers python3.13
      # (KOINE_PYTHON overrides); ResolveMypy() finds `mypy` on PATH (KOINE_MYPY overrides).
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      # Cache pip's download/wheel cache so the pinned mypy install restores instead of
      # re-downloading the wheel every run. Keyed on the exact pin below.
      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mypy-1.13.0
          restore-keys: ${{ runner.os }}-pip-

      - name: Install mypy
        # Pin exactly so a future mypy release tightening `--strict` inference can't redden
        # the conformance suite on an unrelated day with no source change.
        run: python -m pip install mypy==1.13.0

      # Cache the cargo registry + git sources so the Rust conformance `cargo check` restores
      # crate metadata/sources instead of re-fetching over the network. runner.os-scoped and
      # keyed on a stable revision: the conformance fixtures are dependency-free, so a coarse
      # key is fine — the cache mainly banks the crates.io index. (koine-studio.yml already
      # caches ~/.cargo/registry for its Tauri build; this extends the pattern to ci.yml.)
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-ci-v1
          restore-keys: ${{ runner.os }}-cargo-ci-

      # Rust: the Rust conformance suite runs `cargo check` over an emitted crate.
      # ResolveCargo() finds `cargo` on PATH (KOINE_CARGO overrides). The ubuntu-latest image ships
      # rustup with a default stable toolchain preinstalled, so provision through rustup directly
      # rather than dtolnay/rust-toolchain@stable: that action unconditionally fetches the latest
      # stable channel over the network, and a transient blip there (or a PATH-propagation race into
      # the next step) occasionally leaves no usable `cargo` for the Test step, reddening an unrelated
      # build (issue #524). Reuse the preinstalled toolchain when it already works, and only hit the
      # network — with a bounded retry/backoff — when `cargo` is genuinely absent, so a single blip
      # self-heals. A persistent failure still reddens here (and at the preflight below), never
      # silently: #240's "missing toolchain in CI = hard failure" guarantee is preserved, just
      # surfaced earlier and more clearly. The dependency-free `cargo check` fixtures are
      # version-robust, so any stable cargo suffices.
      - name: Setup Rust
        run: |
          set -euo pipefail
          if cargo --version 2>/dev/null; then
            echo "Reusing the stable cargo already on PATH."
          else
            for attempt in 1 2 3; do
              if rustup toolchain install stable --profile minimal && rustup default stable; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "::error::Could not provision the Rust stable toolchain after ${attempt} attempts."
                exit 1
              fi
              echo "rustup install failed (attempt ${attempt}); retrying in $((attempt * 10))s…" >&2
              sleep "$((attempt * 10))"
            done
          fi
          echo "${CARGO_HOME:-${HOME}/.cargo}/bin" >> "${GITHUB_PATH}"
          cargo --version

      # Fail-fast conformance-toolchain preflight (issue #524). The Test step below runs with
      # KOINE_REQUIRE_CONFORMANCE=1, which turns a toolchain that has dropped off the runner into a
      # hard FAILURE buried ~80s deep in the test log (issue #240). Assert every conformance tool
      # resolves on PATH here instead, so a provisioning miss reddens at this clearly-named step —
      # naming the absent tool — and is diagnosed in seconds rather than mined from a test log. This
      # strengthens, never weakens, the #240 gate: a genuinely missing toolchain still fails CI, just
      # earlier and more legibly.
      - name: Verify conformance toolchains
        run: |
          set -e
          cargo --version
          tsc --version
          php --version
          phpstan --version
          mypy --version

      - name: Build
        run: dotnet build -c Release -nodereuse:false

      # Enforce .editorconfig on hand-written code (generated files carry the
      # auto-generated header and are skipped here; their conformance is verified
      # against the freshly emitted demo below). Runs after Build so it reuses the
      # restore instead of triggering a second implicit compile of the solution.
      - name: Verify formatting
        run: dotnet format Koine.slnx --verify-no-changes --no-restore

      # Run the whole solution so both test projects execute: the compiler suite
      # (including every emitter's conformance harness, which now type-checks for real
      # against the toolchains installed above) and tests/Koine.Mcp.Tests.
      # KOINE_REQUIRE_CONFORMANCE=1 makes a missing toolchain a hard FAILURE here (issue #240):
      # since all four toolchains are installed above, no RequireOrSkip-based conformance test may
      # report Skipped in CI, so a toolchain quietly dropping off the runner reddens the build instead
      # of passing silently.
      #
      # The `--blame-hang-*` flags are hang DIAGNOSTICS (issue #1486), not a behavior change. Twice in
      # one day this job ran out its full 30-minute `timeout-minutes` budget and was killed with no
      # signal at all — and in both traces the same single assembly was the culprit: the other three
      # (Koine.Compiler.PublicApiConsumer, Koine.Wasm.Tests, Koine.Mcp.Tests) each printed `Passed!`
      # within a minute, while Koine.Compiler.Tests never printed a pass/fail line and the runner's
      # orphan-process sweep killed it still running. A job cancelled by the workflow timeout leaves
      # nothing behind to debug, so the next occurrence must capture evidence instead.
      #
      # VSTest's blame collector fires when no test-completion event arrives within the timeout: it
      # dumps the hung test host (managed + native stacks) and writes a Sequence.xml naming the test
      # that was in flight. The whole suite runs in ~3 minutes, so 15m per test is a vast margin that no
      # healthy test can trip — and it fires ~10 minutes shy of the job's 30-minute ceiling, leaving
      # room to write the dump and upload it (the plan's 20m would leave ~6, too tight for a full dump).
      # On a healthy run this is a no-op beyond the collector's per-test bookkeeping. Deliberately NOT
      # paired with a `timeout-minutes` bump: the ceiling is what surfaces the bug (issue #1486's
      # "Alternatives considered"), so it stays put — this just makes the hang diagnosable when it hits.
      - name: Test
        env:
          KOINE_REQUIRE_CONFORMANCE: 1
        run: >-
          dotnet test Koine.slnx -c Release --no-build -nodereuse:false
          --results-directory "${{ github.workspace }}/TestResults"
          --blame-hang --blame-hang-timeout 15m --blame-hang-dump-type full

      # The hang dump + Sequence.xml are worthless if they die with the runner. Publish them on any
      # failure of the job (a hang now fails the Test step rather than silently eating the whole
      # 30-minute budget), so the next recurrence is diagnosed from an artifact instead of a third
      # live incident. `if-no-files-found: ignore` keeps an ordinary red test — which writes no dump —
      # from adding a spurious "no artifact" annotation on top of the real failure.
      - name: Upload test hang diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/TestResults
          if-no-files-found: ignore
          retention-days: 14

      # End-to-end guard: the demo regenerates C# from .koi and compiles it.
      # A demo build failure is a CI failure (it proves the emitter still works).
      - name: Build generated demo
        run: dotnet build demo/Pizzeria.Domain/Pizzeria.Domain.csproj -c Release

      # Generated code must respect the same .editorconfig as hand-written code.
      # The build above re-emits the demo; verify the emitter's output conforms.
      - name: Verify generated code formatting
        run: dotnet format demo/Pizzeria.Domain/Pizzeria.Domain.csproj --include-generated --verify-no-changes

      # Real-wasm smoke test (issue #333): publish the browser-wasm bundle, then drive the WHOLE
      # [JSExport] surface under Node against the PUBLISHED module — the one thing the desktop
      # wire-parity tests (tests/Koine.Wasm.Tests, which run on desktop .NET) cannot do: catch a
      # trim/runtime failure in the reflection-rooted paths (Ast/NodeWalker reflects, ANTLR
      # deserializes its ATN — both rooted whole in Koine.Wasm.csproj precisely because TrimMode=full
      # would otherwise drop them). This is the default (interpreter) publish, NOT the AOT bundle the
      # docs site deploys (-p:KoineWasmAot=true; ~30s slower) — but PublishTrimmed/TrimMode=full are
      # identical in both modes, so the trim/reflection breakage this guards is mode-independent; the
      # AOT bundle's boot is covered separately by the Studio browser smoke. The same run benchmarks
      # the pizzeria compile and prints its `elapsed=` perf number (issues #327/#219), failing on a
      # gross regression. A red exit fails CI. Node is already on PATH from the Setup Node step above.
      - name: Smoke-test the published wasm bundle
        run: |
          dotnet publish src/Koine.Wasm -c Release
          node src/Koine.Wasm/smoke-test.mjs
