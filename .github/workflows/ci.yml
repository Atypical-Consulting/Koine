name: CI

# Build, test, and verify the generated demo on every push and pull request.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same PR branch; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # All projects target net10.0; pin the 10.0.x channel and allow preview
          # builds in case the GA SDK is not yet on the runner image.
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      # No central package management / lock files, so cache the global NuGet
      # package folder keyed on the project files that pin versions.
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build -c Release

      # Enforce .editorconfig on hand-written code (generated files carry the
      # auto-generated header and are skipped here; their conformance is verified
      # against the freshly emitted demo below). Runs after Build so it reuses the
      # restore instead of triggering a second implicit compile of the solution.
      - name: Verify formatting
        run: dotnet format Koine.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test tests/Koine.Compiler.Tests/Koine.Compiler.Tests.csproj -c Release --no-build

      # End-to-end guard: the demo regenerates C# from .koi and compiles it.
      # A demo build failure is a CI failure (it proves the emitter still works).
      - name: Build generated demo
        run: dotnet build demo/Shop.Domain/Shop.Domain.csproj -c Release

      # Generated code must respect the same .editorconfig as hand-written code.
      # The build above re-emits the demo; verify the emitter's output conforms.
      - name: Verify generated code formatting
        run: dotnet format demo/Shop.Domain/Shop.Domain.csproj --include-generated --verify-no-changes
