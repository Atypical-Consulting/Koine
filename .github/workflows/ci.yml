name: CI

# Build, test, and verify the generated demo on every push and pull request.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same PR branch; never cancel a push to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          # All projects target net10.0; pin the 10.0.x channel and allow preview
          # builds in case the GA SDK is not yet on the runner image.
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      # Conformance toolchains (issue #240). Each non-C# emitter's conformance suite type-checks
      # its emitted output with the target's real tool. TestSupport.RequireOrSkip reports a SKIPPED
      # test when the tool is absent and — because the Test step sets KOINE_REQUIRE_CONFORMANCE=1 —
      # a hard FAILURE in CI. So every toolchain installed below must be present, or the build
      # reddens (no more silent INCONCLUSIVE passes). Versions are pinned so a tool release can't
      # redden the suite on an unrelated day with no source change.
      #
      # Node + TypeScript: ResolveTsc() finds `tsc` on PATH (KOINE_TSC overrides), which a global
      # `npm i -g typescript` install satisfies, so `tsc --noEmit --strict` runs against emitted TS.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install TypeScript
        # Pin the major so a future tsc release tightening `--strict` inference
        # can't redden the conformance suite on an unrelated day with no source change.
        run: npm install -g typescript@6

      # PHP + phpstan: the PHP conformance suite runs `php -l` (syntax) and
      # `phpstan analyse --level max` (type-check) over emitted PHP. setup-php puts both `php`
      # and `phpstan` on PATH (KOINE_PHP / KOINE_PHPSTAN override).
      - name: Setup PHP + phpstan
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpstan:2

      # Python + mypy: the Python conformance suite runs `ast.parse` (syntax) and
      # `mypy --strict` (type-check) over emitted Python. ResolvePython() prefers python3.13
      # (KOINE_PYTHON overrides); ResolveMypy() finds `mypy` on PATH (KOINE_MYPY overrides).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install mypy
        # Pin exactly so a future mypy release tightening `--strict` inference can't redden
        # the conformance suite on an unrelated day with no source change.
        run: python -m pip install mypy==1.13.0

      # Rust: the Rust conformance suite runs `cargo check` over an emitted crate.
      # ResolveCargo() finds `cargo` on PATH (KOINE_CARGO overrides).
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Koine.Wasm targets the browser-wasm RID and is part of the solution, so the
      # `dotnet build`/`dotnet test` over Koine.slnx below need the WebAssembly SDK.
      # Without these workloads the wasm project fails to restore/build. (Same pair the
      # docs pipeline installs in deploy-docs.yml.)
      #
      # The wasm workloads (emscripten + browser-wasm runtime pack) are slow to
      # download; cache the SDK workload folders keyed on the SDK version.
      - name: Cache wasm workloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.dotnet/sdk-manifests
            ~/.dotnet/packs
            ~/.dotnet/metadata
            ~/.dotnet/sdk-advertising
          key: ${{ runner.os }}-wasm-workloads-${{ hashFiles('Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-wasm-workloads-

      - name: Install wasm workloads
        run: dotnet workload install wasm-tools wasm-experimental

      # No central package management / lock files, so cache the global NuGet
      # package folder keyed on the project files that pin versions.
      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build
        run: dotnet build -c Release

      # Enforce .editorconfig on hand-written code (generated files carry the
      # auto-generated header and are skipped here; their conformance is verified
      # against the freshly emitted demo below). Runs after Build so it reuses the
      # restore instead of triggering a second implicit compile of the solution.
      - name: Verify formatting
        run: dotnet format Koine.slnx --verify-no-changes --no-restore

      # Run the whole solution so both test projects execute: the compiler suite
      # (including every emitter's conformance harness, which now type-checks for real
      # against the toolchains installed above) and tests/Koine.Mcp.Tests.
      # KOINE_REQUIRE_CONFORMANCE=1 makes a missing toolchain a hard FAILURE here (issue #240):
      # since all four toolchains are installed above, no conformance test may report Skipped in CI,
      # so a toolchain quietly dropping off the runner reddens the build instead of passing silently.
      - name: Test
        env:
          KOINE_REQUIRE_CONFORMANCE: 1
        run: dotnet test Koine.slnx -c Release --no-build

      # End-to-end guard: the demo regenerates C# from .koi and compiles it.
      # A demo build failure is a CI failure (it proves the emitter still works).
      - name: Build generated demo
        run: dotnet build demo/Pizzeria.Domain/Pizzeria.Domain.csproj -c Release

      # Generated code must respect the same .editorconfig as hand-written code.
      # The build above re-emits the demo; verify the emitter's output conforms.
      - name: Verify generated code formatting
        run: dotnet format demo/Pizzeria.Domain/Pizzeria.Domain.csproj --include-generated --verify-no-changes
