name: studio-build

# Reusable Koine Studio desktop build (Tauri v2) over Linux/Windows/macOS.
# Called by koine-studio.yml (CI: build+test only) and release-please.yml (release: build+upload).
# `bundle: true` runs `tauri build` to produce installers; `publish: true` uploads them to the
# GitHub Release named by `tag`. Default (bundle=false) reproduces the prior CI behavior exactly.

on:
  workflow_call:
    inputs:
      bundle:
        description: Run `tauri build` to produce distributable installers.
        type: boolean
        default: false
      publish:
        description: Upload the built installers to the release named by `tag` (implies bundle).
        type: boolean
        default: false
      tag:
        description: Release tag to upload installers to (required when publish is true).
        type: string
        default: ''

# No workflow-level `permissions:` on purpose. A reusable workflow that DECLARES more than a caller
# grants fails the whole run at startup (`startup_failure`) — and the CI caller (koine-studio.yml)
# runs read-only. So permissions are inherited from each caller job instead: koine-studio.yml calls
# this read-only (publish=false, nothing is uploaded), while release-please.yml's `studio-desktop`
# job grants `contents: write` for the `gh release upload`. Do not add `contents: write` here.

jobs:
  studio:
    name: studio (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # See ci.yml's build-and-test job for why: MSBuild node reuse can wedge a job on a runner that
    # gets reused (issue #1552). Cheap insurance here too, since this job also runs `dotnet test`.
    env:
      MSBUILDDISABLENODEREUSE: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            triple: x86_64-unknown-linux-gnu
          - os: windows-latest
            rid: win-x64
            triple: x86_64-pc-windows-msvc
          - os: macos-latest
            rid: osx-arm64
            triple: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Cache NuGet
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Tauri v2 on Linux needs WebKitGTK + libsoup and the standard GTK/app-indicator
      # system libraries (linked at `cargo build` time); Windows and macOS runners ship
      # their web views already.
      #
      # We cache the .deb packages so warm runs restore them from the Actions cache and
      # never touch Ubuntu's apt mirror — the Azure mirror intermittently stalls mid-fetch
      # and apt's transfer timeout doesn't catch a slowly-trickling connection (one such
      # stall burned ~50 min before being cancelled). Only a cold cache hits apt; the
      # timeout config below makes that one fetch fail fast instead of hanging.
      - name: Cap apt acquire timeouts (cold-cache safety net)
        if: runner.os == 'Linux'
        run: |
          printf 'Acquire::Retries "3";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' \
            | sudo tee /etc/apt/apt.conf.d/99-koine-timeouts >/dev/null

      - name: Install Linux system dependencies (Tauri v2)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1
        with:
          packages: libwebkit2gtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf
          version: koine-tauri-1

      - name: Publish LSP sidecar
        run: dotnet publish src/Koine.Cli -p:PublishProfile=${{ matrix.rid }}

      - name: Run headless LSP tests
        run: dotnet test tests/Koine.Compiler.Tests/Koine.Compiler.Tests.csproj -c Release -nodereuse:false --filter "FullyQualifiedName~LspServerTests"

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Cargo build
        id: cargo-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tooling/koine-studio/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tooling/koine-studio/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Stage sidecar for Tauri (externalBin)
        shell: bash
        run: |
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          mkdir -p tooling/koine-studio/src-tauri/binaries
          cp "src/Koine.Cli/bin/publish/${{ matrix.rid }}/koine${ext}" \
             "tooling/koine-studio/src-tauri/binaries/koine-${{ matrix.triple }}${ext}"

      # (c) Build Koine Studio: the Rust host (framing + broker, with unit tests) and
      #     the web frontend (TypeScript typecheck + Vite bundle).
      - name: Build Rust host (cargo)
        working-directory: tooling/koine-studio/src-tauri
        shell: bash
        run: |
          # The crate version tracks the Koine release version (bumped by release-please in
          # Cargo.toml + tauri.conf.json). release-please can't cleanly rewrite Cargo.lock — a
          # typed TOML updater reformats it (breaking --locked) and cargo strips generic-updater
          # comments — so on a release PR the lock's own-package version lags Cargo.toml. Refresh
          # just that one entry offline (surgical: touches only koine-studio's version line, no
          # network, no dependency churn) so `--locked` stays a real dependency-reproducibility
          # gate without going red on a version-only drift. That reasoning only holds when the
          # Cargo registry cache above is warm; on a cold/partial cache (cache-hit != 'true') there
          # is no local index for --offline to consult, so fall back to a network-allowed update
          # (issue #1023).
          if [ "${{ steps.cargo-cache.outputs.cache-hit }}" = "true" ]; then
            cargo update -p koine-studio --offline
          else
            cargo update -p koine-studio
          fi
          cargo build --locked
          cargo test --locked

      - name: Install npm dependencies (workspace root)
        run: npm ci

      - name: Build frontend (npm)
        working-directory: tooling/koine-studio
        run: npm run build

      - name: Install Playwright Chromium (Storybook story tests)
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: tooling/koine-studio
          cache-key-files: package-lock.json

      # Issue #400: the Windows runner intermittently exhausts disk during the Vite module-transform
      # phase, crashing vitest workers with "Error: disk full". The cause is drive placement, not
      # total space: %TEMP% lives on C: (~30 GB free) where Vite/rolldown spill their transform temp,
      # while the workspace drive D: has ~140 GB free. Point TEMP/TMP at D: (RUNNER_TEMP already lives
      # there) so the transform has ample headroom. This replaces the previous approach of pruning
      # toolchains off C:, which burned ~3.5 min per run on slow Remove-Item calls to reclaim space on
      # the wrong drive. GITHUB_ENV makes the redirect apply to the vitest step below.
      - name: "Redirect temp to the D: drive for headroom (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "TEMP=$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TMP=$env:RUNNER_TEMP"  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "TEMP/TMP redirected to $env:RUNNER_TEMP"
          Get-PSDrive -PSProvider FileSystem |
            Select-Object Name,
              @{N='Used(GB)';E={[Math]::Round($_.Used/1GB,2)}},
              @{N='Free(GB)';E={[Math]::Round($_.Free/1GB,2)}} |
            Format-Table -AutoSize

      # Issue #1486: make a native crash on this leg diagnosable. `npm test` died with exit code
      # 3221225477 (0xC0000005, STATUS_ACCESS_VIOLATION) after a fully green suite — an opaque native
      # fault with no stack, no failing assertion, nothing to debug. Windows Error Reporting can write a
      # full user-mode dump of the crashing process if asked to beforehand, so ask: any node.exe that
      # faults from here on drops a .dmp into RUNNER_TEMP (the D: drive — same headroom reasoning as the
      # TEMP redirect above), which the upload step below publishes as an artifact. Nothing is produced
      # unless a process actually crashes. Best-effort by construction: a diagnostics step must never be
      # the reason a build goes red, so a registry write that fails (permissions, image change) warns and
      # carries on rather than failing the job.
      - name: Enable crash dumps for node.exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpDir = Join-Path $env:RUNNER_TEMP 'node-crash-dumps'
          try {
            New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null
            $key = 'HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\node.exe'
            New-Item -Path $key -Force | Out-Null
            # DumpType 2 = full dump: a native access violation needs every thread's stack (the whole
            # point is to learn WHICH thread and which native frame faulted), which a mini dump elides.
            New-ItemProperty -Path $key -Name DumpFolder -Value $dumpDir -PropertyType ExpandString -Force | Out-Null
            New-ItemProperty -Path $key -Name DumpType   -Value 2        -PropertyType DWord        -Force | Out-Null
            New-ItemProperty -Path $key -Name DumpCount  -Value 3        -PropertyType DWord        -Force | Out-Null
            Write-Host "WER local dumps for node.exe -> $dumpDir"
          } catch {
            Write-Host "::warning::Could not enable WER local dumps ($($_.Exception.Message)); continuing without crash-dump capture."
          }
          "KOINE_NODE_CRASH_DUMPS=$dumpDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Issue #1486, the fix. A bare `vitest run` executes BOTH projects — `unit` (happy-dom, and on
      # Windows the worker_threads pool that #414 forced us onto) and `storybook` (Playwright/Chromium) —
      # concurrently in one Node process. On Windows that makes a native fault in a test worker fatal to
      # the whole run (0xC0000005), because a worker_thread shares the process with the browser project's
      # runtime; on Linux/macOS the same fault would only kill a `forks` child and be reported. Splitting
      # the run into two sequential processes decouples them without reverting the #414 `threads` fix.
      # See the header comment in tooling/koine-studio/vitest.config.ts for the full mechanism.
      #
      # `npm test -- --project X` forwards to the very same `vitest run` the other legs use — identical
      # binary resolution, identical config, identical tests; only the process boundary differs. The
      # non-Windows legs keep the single combined run (they are green; do not perturb them).
      - name: Test frontend (npm — projects split, issue #1486)
        if: runner.os == 'Windows'
        working-directory: tooling/koine-studio
        shell: bash
        run: |
          npm test -- --project unit
          npm test -- --project storybook

      - name: Test frontend (npm)
        if: runner.os != 'Windows'
        working-directory: tooling/koine-studio
        run: npm test

      # Publish whatever WER captured, so a recurrence is debugged from a faulting stack instead of a
      # third round of inference from an exit code. `if-no-files-found: ignore` keeps an ordinary red
      # test — which crashes nothing and so dumps nothing — from bolting a spurious warning onto the
      # real failure.
      - name: Upload node crash dumps (Windows)
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: studio-windows-node-crash-dumps-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.KOINE_NODE_CRASH_DUMPS }}
          if-no-files-found: ignore
          retention-days: 14

      # --- Release-only: build the distributable installers and upload them. ---
      # `tauri build` runs beforeBuildCommand (npm run build) then a cargo release build + bundles
      # for this OS (tauri.conf.json bundle.targets = "all"). The `-- ` forwards `build` to the
      # local tauri CLI. Installers are UNSIGNED (no signing secrets configured).
      - name: Build Tauri installers
        if: ${{ inputs.bundle }}
        working-directory: tooling/koine-studio
        run: npm run tauri -- build

      - name: Collect installers
        if: ${{ inputs.bundle }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dest="studio-installers"
          mkdir -p "$dest"
          base="tooling/koine-studio/src-tauri/target/release/bundle"
          for f in "$base"/dmg/*.dmg \
                   "$base"/msi/*.msi "$base"/nsis/*.exe \
                   "$base"/appimage/*.AppImage "$base"/deb/*.deb "$base"/rpm/*.rpm; do
            cp "$f" "$dest/"
          done
          echo "Collected installers:"; ls -la "$dest"

      - name: Upload installers to release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(studio-installers/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No Studio installers were collected — nothing to upload." >&2
            exit 1
          fi
          gh release upload "${{ inputs.tag }}" "${files[@]}" --clobber
