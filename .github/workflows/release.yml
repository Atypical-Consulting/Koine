name: Release

# Packs the Koine CLI as a .NET global tool on version tag pushes (v*).
# Publishing to NuGet is intentionally left out — add the push step once a
# NUGET_API_KEY secret is configured (see the TODO below).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    # Backstop so a hung restore/pack can't run to the 6-hour default; a cold pack is minutes.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # De-duplicated .NET setup (setup-dotnet -> NuGet cache) via the shared composite.
      # The CLI pack never touches Koine.Wasm, so skip the wasm workloads.
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet-wasm
        with:
          install-wasm-workloads: false

      - name: Pack CLI
        run: dotnet pack src/Koine.Cli/Koine.Cli.csproj -c Release -o ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: koine-cli-nupkg
          path: ./artifacts/*.nupkg

      # TODO: Publish to NuGet once a NUGET_API_KEY repository secret is set, e.g.:
      # - name: Push to NuGet
      #   run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
