name: Website

# Gate pull requests on the website's Node-env vitest unit suite (~70 tests across
# website/src/**/*.test.ts). The .NET solution is gated by ci.yml and the Koine Studio
# package by koine-studio.yml; this is the equivalent PR gate for the docs-site /
# Playground TypeScript — so a logic regression in the boot-watchdog/fallback wiring,
# the supersede/abort path, or the service-worker registration fails a PR check instead
# of merging green and surfacing only post-merge (issue #587, the gap noticed in #510).
#
# Node-only and fast (the suite is ~300ms; the worker is mocked): no wasm workloads, no
# AOT bundle, no Chromium. The real-browser boot smoke (npm run test:browser) stays the
# separate post-merge gate in deploy-docs.yml.
#
# Path-gated to website/** and src/** (the Playground bundles the compiler to wasm, so a
# compiler change can affect website behaviour), plus templates/** (the website-build job
# compiles templates/pizzeria into the living docs and scans every template for the
# Playground samples, so a template change can break the static build) and this workflow
# file itself, so unrelated PRs don't pay for it.

on:
  pull_request:
    paths:
      - 'website/**'
      - 'src/**'
      - 'templates/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded PR runs; never cancel a manual dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  website-tests:
    name: website-tests
    runs-on: ubuntu-latest
    # Backstop so a hung install can't run to the 6-hour default. `npm ci` now installs the whole
    # npm workspace (issue #905: `website` depends on `@atypical/koine-ui`, and vanilla npm has no
    # sparse/per-workspace install — every `npm ci` resolves the union of all workspace members'
    # deps against the single root lockfile), so this is heavier than the website-only install it
    # replaced, but the vitest run itself is still ~300ms; 10 minutes stays a generous ceiling.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Astro 7 / Starlight require Node >= 22.12 (matches deploy-docs.yml).
          node-version: 24
          cache: npm
          # The repo root is the npm workspace root (tooling/*, website); the workspace's
          # single lockfile lives there, not per-member.
          cache-dependency-path: package-lock.json

      # npm workspaces keep a single lockfile at the repo root, so `npm ci` must run
      # there (it resolves `@atypical/koine-ui` via the workspace symlink, not the
      # registry, and its postinstall script builds koine-ui's dist/). The test step
      # below still runs from website/; npm's ancestor node_modules walk finds the
      # root-installed deps normally.
      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Run website unit tests (vitest, Node env)
        working-directory: ./website
        run: npm test

  # Gate PRs on a *real* static build (`astro build`), not just vitest. The vitest job above never
  # runs `astro build`, so a build-time break — like the `/blog/rss.xml` × `trailingSlash: 'always'`
  # route failure (#948) — sailed through PR checks green and only turned deploy-docs.yml red after
  # merge. This job closes that gap: any PR that breaks the static build now fails here.
  #
  # It is a lightweight smoke, not the full deploy build. It generates only the content the static
  # build needs — the Playground sample manifest (build-samples, Node-only) and the domain-reference
  # docs (build-docs, which shells out to the Koine CLI) — then runs `astro build` (npm run
  # build:check). It deliberately skips the heavy wasm/AOT compiler, the Studio bundle, and the OG
  # image that deploy-docs.yml publishes: those are runtime assets copied from public/ and are not
  # required for the static build to succeed. So this needs the .NET SDK (for the docs emitter) but
  # NOT the slow browser-wasm workloads.
  website-build:
    name: website-build
    runs-on: ubuntu-latest
    # build-docs restores + builds the Koine CLI on first run; astro build is seconds. 15 min is ample.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The docs emitter (scripts/build-docs.mjs) runs `dotnet run --project src/Koine.Cli`, so the
      # static build needs the .NET SDK — but it never touches Koine.Wasm, so skip the (slow) wasm
      # workloads via the composite's install-wasm-workloads: 'false'.
      - name: Setup .NET (no wasm)
        uses: ./.github/actions/setup-dotnet-wasm
        with:
          install-wasm-workloads: 'false'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Astro 7 / Starlight require Node >= 22.12 (matches deploy-docs.yml).
          node-version: 24
          cache: npm
          # Single workspace lockfile at the repo root (tooling/*, website).
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Build the static site (astro build smoke)
        working-directory: ./website
        run: npm run build:check
